<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Honey Badger Flight Logistics – Reference Documentation</title>
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/vendor/bootstrap.min.css" />
  <link rel="stylesheet" href="/vendor/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
  <style>
    #docs-frame {
      width: 100%;
      border: none;
      display: block;
      /* Fill the remaining viewport below the page header */
      height: calc(100vh - 160px);
      min-height: 400px;
    }
  </style>
</head>
<body class="bg-body-tertiary">
  <nav class="navbar bg-body shadow-sm mb-4">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/"><i class="bi bi-airplane me-2"></i>Honey Badger Flight Logistics</a>
      <button id="theme-toggle" class="btn btn-sm btn-outline-secondary ms-auto" title="Toggle theme" onclick="toggleTheme()">
        <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
      </button>
    </div>
  </nav>

  <main class="container-fluid pb-4">
    <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap mb-3">
      <div>
        <nav aria-label="breadcrumb" class="mb-2">
          <ol class="breadcrumb small mb-0">
            <li class="breadcrumb-item"><a href="/" class="link-secondary text-decoration-none">Home</a></li>
            <li class="breadcrumb-item">API Documentation</li>
            <li class="breadcrumb-item active" aria-current="page">Reference Documentation</li>
          </ol>
        </nav>
        <h1 class="h3 fw-bold mb-1"><i class="bi bi-journal-text me-2"></i>Reference Documentation</h1>
        <p class="text-body-secondary mb-0">Honey Badger Flight Logistics reference documentation.</p>
      </div>
      <a href="/docs/index.html" class="btn btn-sm btn-outline-secondary" target="_blank" rel="noopener noreferrer">
        <i class="bi bi-box-arrow-up-right me-1"></i>Open in new tab
      </a>
    </div>

    <div class="bg-body rounded shadow-sm overflow-hidden">
      <iframe
        id="docs-frame"
        src="/docs/index.html"
        title="Reference Documentation"
      ></iframe>
    </div>
  </main>

  <script src="/vendor/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // Resize the iframe so it fills the remaining viewport height,
    // accounting for the navbar and page header above it.
    function resizeFrame() {
      var frame = document.getElementById('docs-frame');
      var top = frame.getBoundingClientRect().top;
      var padding = 24; // pb-4 bottom padding
      frame.style.height = (window.innerHeight - top - padding) + 'px';
    }
    window.addEventListener('load', resizeFrame);
    window.addEventListener('resize', resizeFrame);
  </script>
</body>
</html>
