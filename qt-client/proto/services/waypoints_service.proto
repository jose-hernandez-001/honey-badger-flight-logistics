syntax = "proto3";

package openapitools.services.waypointsservice;

import "google/protobuf/empty.proto";
import public "models/problem_detail.proto";
import public "models/waypoint.proto";
import public "models/waypoint_list.proto";
import public "models/waypoint_page.proto";
import public "models/waypoint_patch.proto";
import public "models/waypoint_reorder_request.proto";
import public "models/waypoint_request.proto";

service WaypointsService {
  rpc CreateWaypoint   (CreateWaypointRequest)   returns (CreateWaypointResponse);
  rpc DeleteWaypoint   (DeleteWaypointRequest)   returns (DeleteWaypointResponse);
  rpc GetWaypoint      (GetWaypointRequest)      returns (GetWaypointResponse);
  rpc ListWaypoints    (ListWaypointsRequest)    returns (ListWaypointsResponse);
  rpc PatchWaypoint    (PatchWaypointRequest)    returns (PatchWaypointResponse);
  rpc ReorderWaypoints (ReorderWaypointsRequest) returns (ReorderWaypointsResponse);
  rpc UpdateWaypoint   (UpdateWaypointRequest)   returns (UpdateWaypointResponse);
}

message CreateWaypointRequest {
  string          route_id         = 1;
  WaypointRequest waypoint_request = 2;
}

message CreateWaypointResponse {
  oneof response {
    Waypoint      waypoint_201        = 1;
    ProblemDetail problem_detail_400  = 2;
    ProblemDetail problem_detail_404  = 3;
    ProblemDetail problem_detail_422  = 4;
    ProblemDetail problem_detail_500  = 5;
  }
}

message DeleteWaypointRequest {
  string route_id    = 1;
  string waypoint_id = 2;
}

message DeleteWaypointResponse {
  oneof response {
    google.protobuf.Empty empty_204           = 1;
    ProblemDetail         problem_detail_404  = 2;
    ProblemDetail         problem_detail_500  = 3;
  }
}

message GetWaypointRequest {
  string route_id    = 1;
  string waypoint_id = 2;
}

message GetWaypointResponse {
  oneof response {
    Waypoint      waypoint_200        = 1;
    ProblemDetail problem_detail_404  = 2;
    ProblemDetail problem_detail_500  = 3;
  }
}

message ListWaypointsRequest {
  string route_id = 1;
  int32  page     = 2;
  int32  size     = 3;
  string sort     = 4;
}

message ListWaypointsResponse {
  oneof response {
    WaypointPage  waypoint_page_200   = 1;
    ProblemDetail problem_detail_404  = 2;
    ProblemDetail problem_detail_500  = 3;
  }
}

message PatchWaypointRequest {
  string        route_id       = 1;
  string        waypoint_id    = 2;
  WaypointPatch waypoint_patch = 3;
}

message PatchWaypointResponse {
  oneof response {
    Waypoint      waypoint_200        = 1;
    ProblemDetail problem_detail_400  = 2;
    ProblemDetail problem_detail_404  = 3;
    ProblemDetail problem_detail_422  = 4;
    ProblemDetail problem_detail_500  = 5;
  }
}

message ReorderWaypointsRequest {
  string                 route_id                 = 1;
  WaypointReorderRequest waypoint_reorder_request = 2;
}

message ReorderWaypointsResponse {
  oneof response {
    WaypointList  waypoint_list_200   = 1;
    ProblemDetail problem_detail_400  = 2;
    ProblemDetail problem_detail_404  = 3;
    ProblemDetail problem_detail_422  = 4;
    ProblemDetail problem_detail_500  = 5;
  }
}

message UpdateWaypointRequest {
  string          route_id         = 1;
  string          waypoint_id      = 2;
  WaypointRequest waypoint_request = 3;
}

message UpdateWaypointResponse {
  oneof response {
    Waypoint      waypoint_200        = 1;
    ProblemDetail problem_detail_400  = 2;
    ProblemDetail problem_detail_404  = 3;
    ProblemDetail problem_detail_422  = 4;
    ProblemDetail problem_detail_500  = 5;
  }
}
