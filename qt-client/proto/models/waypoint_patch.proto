syntax = "proto3";

package openapitools;

message WaypointPatch {
  string name      = 3373707;
  int32  sequence  = 275806147;
  double latitude  = 366236566;
  double longitude = 137365935;
  double altitude  = 425937573;
  double speed     = 109641799;
  double heading   = 258440707;
  int32  hold_time = 128333391;
}
